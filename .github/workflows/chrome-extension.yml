name: chrome-extension

on:
  push:
    branches: [main]
    paths:
      - 'extension/**'
      - 'scripts/package-extension.mjs'
      - 'scripts/validate-extension.mjs'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'mcp/**'
      - '.github/workflows/chrome-extension.yml'
    tags:
      - 'extension-v*'
  workflow_dispatch:

concurrency:
  group: chrome-extension-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: validate, test, package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root deps
        run: npm install --no-audit --no-fund

      - name: Install mcp deps
        run: npm --prefix mcp install --no-audit --no-fund

      - name: Install showcase/server deps (needed by server-telemetry tests in npm test chain)
        run: npm --prefix showcase/server install --no-audit --no-fund

      - name: Install showcase/angular deps (needed by fsb-telemetry-service + build-smoke + privacy-page tests in npm test chain)
        run: npm --prefix showcase/angular install --no-audit --no-fund

      - name: Validate extension
        run: npm run validate:extension

      - name: Run extension and bridge tests
        run: npm test

      - name: Package Chrome extension
        run: npm run package:extension

      - name: Read extension version
        id: extension_version
        run: |
          node -e "const { version } = require('./extension/manifest.json'); console.log('version=' + version)" >> "$GITHUB_OUTPUT"

      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: fsb-extension-v${{ steps.extension_version.outputs.version }}
          path: dist/fsb-extension-v*.zip
          if-no-files-found: error

      # On extension-v* tag pushes, also attach the zip to the matching
      # GitHub Release. Mirrors the pattern in .github/workflows/npm-publish.yml.
      # The if-guard keeps main-branch pushes artifact-only (no Release touch).
      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/extension-v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fsb-extension-v*.zip
          fail_on_unmatched_files: true

  publish-cws:
    name: publish to Chrome Web Store
    needs: package
    if: startsWith(github.ref, 'refs/tags/extension-v') && vars.CWS_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root deps
        run: npm install --no-audit --no-fund

      - name: Install mcp deps
        run: npm --prefix mcp install --no-audit --no-fund

      - name: Rebuild Chrome extension zip
        run: npm run package:extension

      - name: Resolve zip path
        id: zip
        run: |
          ZIP=$(ls dist/fsb-extension-v*.zip | head -n1)
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: ${{ steps.zip.outputs.path }}
          extension-id: ${{ secrets.CWS_EXTENSION_ID }}
          client-id: ${{ secrets.CWS_CLIENT_ID }}
          client-secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CWS_REFRESH_TOKEN }}
          publish: true
