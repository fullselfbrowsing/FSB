<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FSB - Onboarding</title>
  <link rel="stylesheet" href="../assets/onboarding/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="onboarding.css">
</head>
<body>
  <main class="ob" data-theme="dark" data-screen-label="FSB Onboarding">
    <div class="ob-glow" aria-hidden="true"></div>
    <header class="ob-top">
      <div class="ob-top-l">
        <span class="fsb-mark" translate="no" aria-label="FSB">
          <span class="fsb-row">
            <span class="fsb-f">F</span><span class="fsb-s">S</span><svg class="fsb-b" viewBox="-3 -3 78 103" aria-hidden="true"><path d="M0 0 L40 0 C58 0 70 10 70 26 C70 38 62 46 50 49 C64 51 72 60 72 74 C72 90 60 100 40 100 L0 100 Z"></path></svg>
          </span>
        </span>
        <span class="ob-top-tag">Onboarding</span>
      </div>
      <div class="ob-top-r">
        <span class="ob-ver" id="obStepLabel" translate="no">Step 1 of 5</span>
        <button class="ob-icon-btn" type="button" id="obThemeToggle" aria-label="Toggle theme">
          <i class="fa-regular fa-sun"></i>
        </button>
      </div>
    </header>

    <section class="ob-stage">
      <div class="ob-card" id="obCard">
        <div class="ob-stepper" aria-label="Onboarding progress">
          <div class="ob-track"><div class="ob-track-fill" id="obTrackFill"></div></div>
          <div class="ob-nodes" id="obNodes"></div>
        </div>
        <div id="obScreen"></div>
      </div>
    </section>

    <div class="ob-toast" id="obToast" role="status" aria-live="polite">
      <i class="fa-solid fa-circle-check"></i>
      <span id="obToastMsg"></span>
    </div>
  </main>
  <script src="onboarding.js"></script>
</body>
</html>
