<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FSB - Side Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="../shared/fsb-ui-core.css">
  <link rel="stylesheet" href="sidepanel.css">
  <link rel="stylesheet" href="markdown.css">
</head>
<body>
  <div class="sidepanel-container">
    <header class="sidepanel-header">
      <div class="header-info">
        <div class="brand-row">
          <h1>FSB</h1>
          <span class="surface-subtitle">Persistent workspace</span>
        </div>
        <div class="status-indicator">
          <i class="fa fa-circle status-dot"></i>
          <span class="status-text">Ready</span>
          <!-- Phase 243 plan 03 (UI-02): read-only "owned by Agent X" chip.
               Hidden by default; refreshOwnerChip toggles visibility on load
               and on chrome.tabs.onActivated. NEVER a button (Threat
               T-243-03-03 mitigation). -->
          <span id="fsb-owner-chip" class="fsb-owner-chip" style="display:none"></span>
          <span id="fsb-lockout-aria-description" class="sr-only">Side panel input disabled because the active tab is controlled by another agent</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="historyBtn" class="icon-btn" title="Session History">
          <i class="fa fa-clock-rotate-left"></i>
        </button>
        <button id="newChatBtn" class="icon-btn" title="Start New Chat">
          <i class="fa fa-plus"></i>
        </button>
        <button id="settingsBtn" class="icon-btn" title="Settings">
          <i class="fa fa-cog"></i>
        </button>
      </div>
    </header>

    <div id="historyView" class="history-view hidden">
      <div class="history-header">
        <h3>Session History</h3>
        <button id="clearAllHistoryBtn" class="history-clear-all-btn" title="Delete All Sessions">
          <i class="fa fa-trash"></i>
          <span>Clear All</span>
        </button>
      </div>
      <div class="history-list" id="historyList">
        <!-- Session items rendered dynamically -->
      </div>
    </div>

    <div class="chat-messages-area">
      <div id="chatMessages" class="chat-messages">
        <section
          id="delegationRun"
          class="delegation-run hidden"
          data-runtime-contract="FSB_DELEGATION"
          aria-labelledby="delegationRunHeading"
          aria-busy="false"
        >
          <div id="delegationStateCard" class="delegation-state-card"></div>
          <div id="delegationFeed" class="delegation-feed"></div>
        </section>
        <!-- Messages will be dynamically added here -->
      </div>
      <div
        id="delegationAnnouncer"
        class="sr-only"
        role="status"
        aria-live="polite"
        aria-atomic="false"
      ></div>
    </div>

    <div id="automationRunner" class="automation-runner hidden" aria-live="off" aria-hidden="true">
      <div class="pixel-loader" aria-hidden="true">
        <div class="pixel-letter pixel-letter-f">
          <span></span><span></span><span></span>
          <span></span><i></i><i></i>
          <span></span><span></span><span></span>
          <span></span><i></i><i></i>
          <span></span><i></i><i></i>
        </div>
        <div class="pixel-letter pixel-letter-s">
          <span></span><span></span><span></span>
          <span></span><i></i><i></i>
          <span></span><span></span><span></span>
          <i></i><i></i><span></span>
          <span></span><span></span><span></span>
        </div>
        <div class="pixel-letter pixel-letter-b">
          <span></span><span></span><span></span>
          <span></span><i></i><span></span>
          <span></span><span></span><span></span>
          <span></span><i></i><span></span>
          <span></span><span></span><span></span>
        </div>
      </div>
      <span id="automationTimer" class="automation-timer">0s</span>
      <span id="automationRunnerLabel" class="sr-only">Automation running</span>
    </div>

    <div id="delegationControlBar" class="delegation-control-bar hidden"></div>
    
    <div class="chat-input-area">
      <div class="input-container">
        <div class="input-wrapper">
          <div 
            id="chatInput" 
            class="chat-input" 
            contenteditable="true" 
            data-placeholder=""
            role="textbox"
            aria-multiline="true"
          ></div>
          <div class="input-actions">
            <button id="stopBtn" class="stop-btn hidden" title="Stop Automation">
              <i class="fa fa-stop"></i>
            </button>
            <button id="micBtn" class="mic-btn" title="Voice input">
              <i class="fa fa-microphone"></i>
            </button>
            <button id="sendBtn" class="send-btn" title="Send Message">
              <i class="fa fa-arrow-up"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
    
    
    <!-- Extension Footer -->
    <div class="author-footer">
      <div class="footer-line">
        <span class="footer-version" id="footerVersion"></span>
      </div>
    </div>

    <!-- Payment fill confirmation overlay -->
    <div id="paymentFillConfirmOverlay" class="payment-fill-confirm-overlay hidden">
      <div class="payment-fill-confirm-card">
        <div class="payment-fill-confirm-header">
          <i class="fas fa-shield-halved"></i>
          <span>Confirm Payment Fill</span>
        </div>
        <div class="payment-fill-confirm-body">
          <div class="payment-fill-confirm-detail">
            <span class="payment-fill-confirm-brand" id="pfcBrand"></span>
            <span class="payment-fill-confirm-last4" id="pfcLast4"></span>
          </div>
          <div class="payment-fill-confirm-domain" id="pfcDomain"></div>
          <p class="payment-fill-confirm-note">Card details will be filled into the form fields. FSB will not submit the payment.</p>
        </div>
        <div class="payment-fill-confirm-actions">
          <button class="payment-fill-confirm-btn allow" id="pfcAllow">Allow</button>
          <button class="payment-fill-confirm-btn deny" id="pfcDeny">Deny</button>
        </div>
      </div>
    </div>
  </div>
  
  <script src="../lib/marked.min.js"></script>
  <script src="../lib/purify.min.js"></script>
  <script src="../lib/mermaid.min.js"></script>
  <script src="../lib/chart.min.js"></script>
  <script src="markdown-renderer.js"></script>
  <script src="../utils/analytics.js"></script>
  <script src="../utils/agent-registry.js"></script>
  <script src="owner-chip.js"></script>
  <script src="sidepanel-tab-conv-store.js"></script>
  <script src="sidepanel-message-log.js"></script>
  <script src="../utils/delegation-providers.js"></script>
  <script src="delegation-feed.js"></script>
  <script src="speech-to-text.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
