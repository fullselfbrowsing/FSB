<section class="placeholder-page section">
  <div class="container">
    <div class="placeholder-shell">
      <p class="placeholder-kicker" i18n="@@placeholder.kicker">Coming Soon</p>
      <h1><span [attr.translate]="'no'">{{ pageTitle }}</span></h1>
      <p class="placeholder-copy" i18n="@@placeholder.copy">
        This page is queued for a dedicated reference rebuild. The route is active now so the updated footer never dead-ends while the full page work continues.
      </p>
      <div class="placeholder-actions">
        <a routerLink="/" class="btn btn-primary" i18n="@@placeholder.cta.home">
          <i class="fa-solid fa-house" aria-hidden="true"></i> Home
        </a>
        <a routerLink="/about" class="btn btn-outline" i18n="@@placeholder.cta.about">
          <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> About
        </a>
      </div>
    </div>
  </div>
</section>
